name: Publish to npm

# Publishes @sitesreviews/mcp when a GitHub Release is published.
# Uses npm provenance (the "built & published from source" badge on npmjs.com),
# which requires `id-token: write` and a public repo + CI. The npm token lives
# only as the NPM_TOKEN repository secret — never in the repo or on a laptop.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run build

      # Safety gate: the package.json version must match the release tag (e.g. v1.2.3).
      - name: Verify version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match release tag ($TAG). Bump the version first."
            exit 1
          fi

      - name: Publish (public, with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
