name: 🐛 Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.

        ⚠️ **Do not report security vulnerabilities here.** See
        [SECURITY.md](https://github.com/SitesReviewsTrust/sites-reviews-mcp/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I ask my assistant to check a domain, the tool returns…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact prompt / tool input you used, if relevant.
      placeholder: |
        1. Connect the server to <client>
        2. Ask: "Is example.com trustworthy?"
        3. The tool returns…
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      description: Which client were you using?
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - Windsurf
        - VS Code (Cline / Continue)
        - MCP Inspector
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Output of `npm view @sitesreviews/mcp version` (or the version pinned in your MCP client config).
      placeholder: "1.0.0"
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any stderr output from the server (it logs to stderr). This will be rendered as code.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been reported yet.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
