name: 💡 Feature request
description: Suggest an idea or improvement for the server
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! This server is intentionally small and
        focused (trust score + reviews, read-only). Feature requests that keep it
        simple and useful are most likely to land.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or the pain point you're hitting.
      placeholder: As a user, when I ask my assistant about a site I want to…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the server to do? (e.g. a new tool, a new field, a new client config.)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or examples that help explain the request.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested yet.
          required: true
        - label: This keeps the server read-only and free of secrets/auth.
          required: false
